version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://fitness:fitness@postgres:5432/fitness
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend-web
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pg_data:
